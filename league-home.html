<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>League Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/pokemon-ui.css">
</head>
<body>
  <div class="page-overlay">
    <section class="pkmn-window">
      <img class="corner-ball top-left" src="images/ui/retroball.png" alt="">
      <img class="corner-ball top-right" src="images/ui/retroball.png" alt="">
      <img class="corner-ball bottom-left" src="images/ui/retroball.png" alt="">
      <img class="corner-ball bottom-right" src="images/ui/retroball.png" alt="">

      <div class="pkmn-title-box">
        <h1 class="pkmn-title">LEAGUE HOME</h1>
        <p id="leagueSubtitle" class="pkmn-subtitle">Loading selected league...</p>
      </div>

      <div class="pkmn-status-box">
        <span id="leagueStatus">Checking league...</span>
      </div>

      <div class="pkmn-menu">
        <a class="pkmn-button-link" href="my-team.html">My Team</a>
        <a class="pkmn-button-link" href="my-matchup.html">My Matchup</a>

        <a class="pkmn-button-link" href="weekly-matches.html">Weekly Matches</a>
        <a class="pkmn-button-link" href="standings.html">Standings</a>

        <a class="pkmn-button-link" href="teams.html">League Info</a>
        <a id="manageLeagueLink" class="pkmn-button-link" href="manage-league.html">Manage League</a>

        <a class="pkmn-button-link" href="draft-room.html">Draft Room</a>
        <a class="pkmn-button-link" href="my-leagues.html">My Leagues</a>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/league-home.js"></script>
</body>
</html>
