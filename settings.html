<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/pokemon-ui.css?v=global-light-contrast1">

  <style>
    body.settings-theme-page {
      margin: 0;
      min-height: 100vh;
      background-image: url("images/backgrounds/VictoryRoad.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      font-family: "Oxanium", Arial, sans-serif;
    }

    .settings-theme-overlay {
      min-height: 100vh;
      background:
        radial-gradient(circle at center 18%, rgba(36, 151, 255, 0.22), transparent 34%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.26), rgba(0, 0, 0, 0.58));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .settings-theme-card {
      width: min(720px, 94vw);
      padding: 24px;
      border-radius: 28px;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.78),
          rgba(0, 0, 0, 0.56)
        );
      border: 2px solid rgba(255, 255, 255, 0.24);
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.52),
        0 0 36px rgba(255, 255, 255, 0.08) inset;
      box-sizing: border-box;
    }

    .settings-title {
      margin: 0;
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 3px 0 rgba(0, 0, 0, 0.70),
        0 0 12px rgba(30, 160, 255, 0.70);
    }

    .settings-subtitle {
      margin: 8px 0 22px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.86);
    }

    .settings-panel {
      padding: 18px;
      border-radius: 22px;
      background: rgba(5, 18, 43, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.28),
        0 0 0 3px rgba(105, 166, 240, 0.10) inset;
    }

    .settings-panel h2 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .settings-panel p {
      margin: 0 0 14px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .settings-choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .settings-choice {
      min-height: 74px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.32),
        0 0 0 3px rgba(105, 166, 240, 0.16) inset;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .settings-choice:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .settings-choice.dark {
      background: linear-gradient(to bottom, #111111, #000000);
      color: white;
    }

    .settings-choice.light {
      background: linear-gradient(to bottom, rgba(238,247,255,0.96), rgba(204,226,247,0.90));
      color: #102844;
    }

    .settings-choice.active {
      outline: 3px solid rgba(255, 217, 76, 0.90);
      outline-offset: 3px;
    }

    .settings-links {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .settings-link {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      border-radius: 999px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.92), rgba(212,226,246,0.88));
      border: 2px solid rgba(255,255,255,0.36);
      color: #102844;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(0,0,0,0.20);
    }

    #settingsStatus {
      margin-top: 14px;
      text-align: center;
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .settings-theme-card {
        padding: 18px;
      }

      .settings-title {
        font-size: 34px;
      }

      .settings-choice-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="settings-theme-page">
  <div class="settings-theme-overlay">
    <section class="settings-theme-card">
      <h1 class="settings-title">Settings</h1>
      <p class="settings-subtitle">Customize your League Home display.</p>

      <div class="settings-panel">
        <h2>League Home Theme</h2>
        <p>Choose whether the League Home main panel uses the dark black glass box or the lighter white-blue panel.</p>

        <div class="settings-choice-grid">
          <button id="darkThemeButton" class="settings-choice dark" type="button">Dark</button>
          <button id="lightThemeButton" class="settings-choice light" type="button">Light</button>
        </div>

        <div id="settingsStatus">Current theme: Dark</div>
      </div>

      <div class="settings-links">
        <a class="settings-link" href="league-home.html?v=settings-return1">Back to League Home</a>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = "pokeleague-league-home-theme";
      const darkButton = document.getElementById("darkThemeButton");
      const lightButton = document.getElementById("lightThemeButton");
      const status = document.getElementById("settingsStatus");

      function apply(theme) {
        const isLight = theme === "light";
        darkButton.classList.toggle("active", !isLight);
        lightButton.classList.toggle("active", isLight);
        status.textContent = "Current theme: " + (isLight ? "Light" : "Dark");
      }

      const saved = localStorage.getItem(STORAGE_KEY) || "dark";
      apply(saved);

      darkButton.addEventListener("click", function () {
        localStorage.setItem(STORAGE_KEY, "dark");
        apply("dark");
      });

      lightButton.addEventListener("click", function () {
        localStorage.setItem(STORAGE_KEY, "light");
        apply("light");
      });
    })();
  </script>
</body>
</html>
