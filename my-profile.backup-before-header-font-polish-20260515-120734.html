<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Profile | FantasyLeague</title>

  <link rel="stylesheet" href="css/pokemon-ui.css" />

  <style>
    body.my-team-theme-page.profile-theme-page {
      margin: 0;
      min-height: 100vh;
      background-image: url("images/backgrounds/VictoryRoad.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      font-family: "Oxanium", Arial, sans-serif;
    }

    .my-team-theme-overlay {
      min-height: 100vh;
      background:
        radial-gradient(circle at center 18%, rgba(36, 151, 255, 0.22), transparent 34%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.26), rgba(0, 0, 0, 0.58));
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .my-team-theme-card.profile-theme-card {
      width: min(1120px, 94vw);
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(
        to bottom,
        rgba(4, 18, 48, 0.70),
        rgba(4, 18, 48, 0.36)
      );
      border: 2px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.42),
        0 0 42px rgba(29, 150, 255, 0.18) inset;
      backdrop-filter: blur(2px);
      box-sizing: border-box;
    }

    .my-team-theme-title {
      margin: 0;
      text-align: center;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 3px 0 rgba(0, 0, 0, 0.70),
        0 0 12px rgba(30, 160, 255, 0.70);
    }

    #profileSubtitle {
      margin: 8px 0 18px;
      text-align: center;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.7px;
      color: rgba(255, 255, 255, 0.90);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.70);
    }

    .my-team-theme-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .my-team-theme-link {
      min-height: 50px;
      min-width: 190px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      border-radius: 999px;
      background: linear-gradient(to bottom, #294b77, #102844);
      border: 2px solid rgba(255, 255, 255, 0.35);
      color: #ffffff;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.95);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.28),
        0 0 0 3px rgba(105, 166, 240, 0.16) inset;
      transition: transform 0.12s ease, filter 0.12s ease;
      box-sizing: border-box;
    }

    .my-team-theme-link.light {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.92), rgba(212, 226, 246, 0.88));
      color: #102844;
      text-shadow: none;
    }

    .my-team-theme-link:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .profile-layout {
      display: grid;
      grid-template-columns: 0.95fr 1.25fr;
      gap: 18px;
      align-items: start;
    }

    .profile-panel {
      padding: 18px;
      border-radius: 22px;
      background: rgba(5, 18, 43, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.28),
        0 0 0 3px rgba(105, 166, 240, 0.10) inset;
      color: #ffffff;
      font-family: "Oxanium", Arial, sans-serif;
      box-sizing: border-box;
    }

    .profile-left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .profile-avatar-ring {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      padding: 7px;
      margin: 6px 0 18px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(105,166,240,0.72));
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.34),
        0 0 28px rgba(30, 160, 255, 0.32);
      box-sizing: border-box;
    }

    .profile-avatar-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.88);
      border: 2px solid rgba(255, 255, 255, 0.60);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .profile-avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-fallback {
      color: #102844;
      font-size: 62px;
      font-weight: 800;
    }

    .profile-upload-label {
      width: 100%;
      min-height: 54px;
      margin-top: 4px;
      border-radius: 999px;
      background: linear-gradient(to bottom, #294b77, #102844);
      border: 2px solid rgba(255, 255, 255, 0.35);
      color: #ffffff;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.95);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.28),
        0 0 0 3px rgba(105, 166, 240, 0.16) inset;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-sizing: border-box;
    }

    .profile-upload-label:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .profile-upload-label input {
      display: none;
    }

    .profile-status {
      min-height: 18px;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.70);
    }

    .profile-main-panel {
      display: grid;
      gap: 18px;
    }

    .profile-account-card,
    .profile-stats-card,
    .profile-coming-card {
      padding: 18px;
      border-radius: 22px;
      background: rgba(5, 18, 43, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.28),
        0 0 0 3px rgba(105, 166, 240, 0.10) inset;
      box-sizing: border-box;
    }

    .profile-account-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .profile-section-label {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.88);
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.75);
    }

    .profile-username {
      margin: 0;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.8px;
      color: #ffffff;
      text-shadow:
        0 2px 0 rgba(0, 0, 0, 0.55),
        0 0 10px rgba(30, 160, 255, 0.48);
    }

    .profile-email {
      margin: 8px 0 0;
      font-size: 15px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.84);
      word-break: break-word;
    }

    .profile-icon-badge {
      width: 92px;
      height: 92px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.88);
      border: 2px solid rgba(255, 255, 255, 0.40);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-icon-badge img {
      width: 68px;
      height: 68px;
      object-fit: contain;
    }

    .account-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .profile-pill {
      border-radius: 999px;
      padding: 8px 11px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.92), rgba(212, 226, 246, 0.88));
      color: #102844;
      font-size: 12px;
      font-weight: 800;
      text-shadow: none;
      box-shadow: 0 5px 12px rgba(0,0,0,0.18);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-box {
      padding: 18px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      border: 2px solid rgba(255, 255, 255, 0.40);
      color: #102844;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.20);
      text-align: center;
    }

    .stat-value {
      display: block;
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-name {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #profileInfoBar {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(5, 18, 43, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: rgba(255, 255, 255, 0.88);
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.20),
        0 0 0 3px rgba(105, 166, 240, 0.10) inset;
    }

    @media (max-width: 820px) {
      .profile-layout {
        grid-template-columns: 1fr;
      }

      .profile-account-header {
        grid-template-columns: 1fr;
      }

      .profile-icon-badge {
        display: none;
      }
    }

    @media (max-width: 540px) {
      .my-team-theme-card.profile-theme-card {
        padding: 18px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .profile-avatar-ring {
        width: 185px;
        height: 185px;
      }
    }
  </style>
</head>

<body class="my-team-theme-page profile-theme-page">
  <div class="my-team-theme-overlay">
    <section class="my-team-theme-card profile-theme-card">
      <h1 class="my-team-theme-title">My Profile</h1>
      <p id="profileSubtitle">Your account, profile picture, and league stats.</p>

      <div class="my-team-theme-links">
        <a class="my-team-theme-link" href="league-home.html?v=profile-return5">Back to League Home</a>
        <a class="my-team-theme-link light" href="my-leagues.html?v=profile-myleagues2">My Leagues</a>
      </div>

      <div id="profileInfoBar">Loading profile...</div>

      <div class="profile-layout">
        <aside class="profile-panel profile-left-panel">
          <div class="profile-avatar-ring">
            <div class="profile-avatar-circle">
              <img id="profileAvatar" alt="Profile picture">
              <div id="avatarFallback" class="avatar-fallback">?</div>
            </div>
          </div>

          <label class="profile-upload-label">
            Change Profile Picture
            <input id="avatarUpload" type="file" accept="image/*">
          </label>

          <div id="profileStatus" class="profile-status"></div>
        </aside>

        <section class="profile-main-panel">
          <div class="profile-account-card">
            <div class="profile-account-header">
              <div>
                <p class="profile-section-label">Logged-in account</p>
                <h2 id="profileUsername" class="profile-username">Loading...</h2>
                <p id="profileEmail" class="profile-email"></p>

                <div class="account-badges">
                  <span id="profileMiniStatus" class="profile-pill">Loading account...</span>
                  <span class="profile-pill">Supabase Account</span>
                  <span id="profileAvatarType" class="profile-pill">Avatar: Loading</span>
                  <span id="profileUserId" class="profile-pill">User ID: Loading</span>
                </div>
              </div>

              <div class="profile-icon-badge">
                <img src="images/ui/soul.png" alt="">
              </div>
            </div>
          </div>

          <div class="profile-stats-card">
            <p class="profile-section-label">Statistics</p>

            <div class="stats-grid">
              <div class="stat-box">
                <span id="lifetimeWL" class="stat-value">0-0</span>
                <span class="stat-name">Lifetime W-L</span>
              </div>

              <div class="stat-box">
                <span id="winPct" class="stat-value">--</span>
                <span class="stat-name">Win %</span>
              </div>
            </div>
          </div>

          <div class="profile-coming-card">
            <p class="profile-section-label">Coming Soon</p>

            <div class="stats-grid">
              <div class="stat-box">
                <span id="profileLevel" class="stat-value">1</span>
                <span class="stat-name">Profile Level</span>
              </div>

              <div class="stat-box">
                <span id="titlesWon" class="stat-value">0</span>
                <span class="stat-name">Titles</span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </div>

  <script src="js/theme-settings.js?v=global-theme1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/my-profile.js?v=true-myteam-format1"></script>
</body>
</html>
