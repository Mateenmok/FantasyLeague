<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Weekly Matches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/pokemon-ui.css?v=weekly1">
</head>
<body>
  <div class="page-overlay top-align">
    <section class="pkmn-window wide">
      <img class="corner-ball top-left" src="images/ui/retroball.png" alt="">
      <img class="corner-ball top-right" src="images/ui/retroball.png" alt="">
      <img class="corner-ball bottom-left" src="images/ui/retroball.png" alt="">
      <img class="corner-ball bottom-right" src="images/ui/retroball.png" alt="">

      <div class="pkmn-title-box">
        <h1 class="pkmn-title">WEEKLY MATCHES</h1>
        <p id="weeklySubtitle" class="pkmn-subtitle">Loading selected league...</p>
      </div>

      <div class="top-links">
        <a class="pkmn-button-link small secondary" href="league-home.html">Back to League Home</a>
        <a class="pkmn-button-link small secondary" href="my-matchup.html">My Matchup</a>
        <a class="pkmn-button-link small secondary" href="standings.html">Standings</a>
      </div>

      <div class="pkmn-panel">
        <p><strong id="weeklyRoundTitle">Current Matchup</strong></p>
        <p id="weeklyRoundStatus" class="small-note">Loading matchups...</p>
      </div>

      <section id="weeklyAdminControls" class="weekly-admin-controls">
        <div class="pkmn-panel">
          <p><strong>Admin Controls</strong></p>
          <p class="small-note">
            Generate the schedule, enter scores for the current matchup, then advance to the next matchup.
          </p>

          <div class="weekly-control-buttons">
            <button id="generateScheduleButton" class="pkmn-button small">Generate Schedule</button>
            <button id="saveScoresButton" class="pkmn-button small">Save Scores</button>
            <button id="advanceMatchupButton" class="pkmn-button small">Advance Matchup</button>
          </div>

          <p id="weeklyAdminStatus" class="small-note">Admin controls ready.</p>
        </div>
      </section>

      <div id="weeklyMatchesList" class="weekly-matches-list"></div>

      <div id="weeklyStatus" class="pkmn-footer-note">Loading...</div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/weekly-matches.js?v=1"></script>
</body>
</html>
