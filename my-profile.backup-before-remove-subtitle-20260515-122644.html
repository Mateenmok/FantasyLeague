<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Profile | FantasyLeague</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/pokemon-ui.css?v=global-black-dark1" />

  <style>
    body.league-home-theme-page.profile-theme-page {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(18, 29, 47, 0.28), rgba(18, 29, 47, 0.28)),
        url("images/backgrounds/CentralPlaza.png"),
        linear-gradient(135deg, #b9cbd8 0%, #dce8ef 52%, #a9b98c 100%);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #102844;
      font-family: "Oxanium", Arial, sans-serif;
    }

    .league-home-theme-overlay {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.16);
    }

    .league-home-theme-card.profile-theme-card {
      width: min(1060px, 94vw);
      padding: 24px;
      border-radius: 24px;
      background: rgba(229, 241, 249, 0.86);
      border: 2px solid rgba(255, 255, 255, 0.65);
      box-shadow: 0 22px 56px rgba(5, 16, 31, 0.34);
      backdrop-filter: blur(7px);
      box-sizing: border-box;
    }

    .league-home-theme-title {
      margin: 0;
      text-align: center;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #102844;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.75),
        0 0 10px rgba(60, 110, 170, 0.18);
    }

    #profileSubtitle {
      margin: 8px 0 18px;
      text-align: center;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.7px;
      color: #17345e;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.80);
    }

    .profile-nav-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .profile-nav-button {
      min-height: 44px;
      min-width: 175px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      border-radius: 999px;
      background: linear-gradient(to bottom, #91d2ee, #65b8dc);
      border: 2px solid rgba(255, 255, 255, 0.65);
      color: #102844;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.5px;
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.18),
        0 0 0 3px rgba(255, 255, 255, 0.18) inset;
      box-sizing: border-box;
    }

    .profile-nav-button.light {
      background: linear-gradient(to bottom, #f2e2a4, #d6bd68);
    }

    .profile-nav-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .profile-content-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      align-items: start;
    }

    .profile-card-panel {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.66);
      border: 2px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.62),
        0 10px 24px rgba(14, 33, 56, 0.14);
      box-sizing: border-box;
      color: #102844;
      font-family: "Oxanium", Arial, sans-serif;
    }

    .profile-avatar-panel {
      min-height: 362px;
      background: linear-gradient(135deg, #d8edf5 0%, #b9d9ea 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .profile-avatar-ring {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      padding: 7px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, #fff0a6 0%, #9ed8ef 46%, #c7b5e8 100%);
      box-shadow: 0 16px 34px rgba(16, 36, 60, 0.22);
      box-sizing: border-box;
    }

    .profile-avatar-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.88);
      border: 4px solid rgba(255, 255, 255, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .profile-avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-fallback {
      color: #102844;
      font-size: 62px;
      font-weight: 800;
    }

    .profile-upload-label {
      width: 100%;
      max-width: 250px;
      min-height: 48px;
      border-radius: 999px;
      background: linear-gradient(to bottom, #294b77, #102844);
      border: 2px solid rgba(255, 255, 255, 0.35);
      color: #ffffff;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.95);
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.28),
        0 0 0 3px rgba(105, 166, 240, 0.16) inset;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-sizing: border-box;
    }

    .profile-upload-label input {
      display: none;
    }

    .profile-status {
      min-height: 14px;
      margin-top: 10px;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: rgba(16, 40, 68, 0.70);
    }

    .profile-right-column {
      display: grid;
      gap: 16px;
    }

    .profile-account-panel {
      background: linear-gradient(135deg, #dce5ef 0%, #bdc9d8 100%);
    }

    .profile-section-label {
      margin: 0 0 10px;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #17345e;
    }

    .profile-username {
      margin: 0;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 0.8px;
      color: #102844;
      line-height: 1.05;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.55),
        0 0 10px rgba(60, 110, 170, 0.16);
    }

    .profile-email {
      margin: 8px 0 0;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: rgba(16, 40, 68, 0.82);
      word-break: break-word;
    }

    .profile-stats-panel {
      background: linear-gradient(135deg, #d8f2c7 0%, #b6dfa0 100%);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-box {
      padding: 18px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(16, 40, 68, 0.12);
      color: #102844;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.62);
    }

    .stat-value {
      display: block;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-name {
      display: block;
      margin-top: 8px;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .favorite-panel {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #f3d98e 0%, #dfbd5c 100%);
    }

    .favorite-header-row {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 14px;
    }

    .favorite-help {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: rgba(16, 40, 68, 0.76);
      text-align: right;
    }

    .favorite-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .favorite-slot {
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(16, 40, 68, 0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.62);
      text-align: center;
    }

    .favorite-circle {
      width: 124px;
      height: 124px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      border: 3px solid rgba(16, 40, 68, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(16, 40, 68, 0.16);
    }

    .favorite-circle img {
      max-width: 92%;
      max-height: 92%;
      object-fit: contain;
      display: none;
    }

    .favorite-empty {
      font-size: 34px;
      font-weight: 800;
      color: rgba(16, 40, 68, 0.42);
    }

    .favorite-name {
      min-height: 22px;
      margin-bottom: 9px;
      font-size: 15px;
      font-weight: 800;
      color: #102844;
    }

    .favorite-input {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border-radius: 12px;
      border: 2px solid rgba(16, 40, 68, 0.18);
      background: rgba(255, 255, 255, 0.90);
      color: #102844;
      font-family: "Oxanium", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      box-sizing: border-box;
      outline: none;
    }

    .favorite-input:focus {
      border-color: rgba(16, 40, 68, 0.44);
      box-shadow: 0 0 0 3px rgba(101, 184, 220, 0.22);
    }

    #favoritePokemonStatus {
      min-height: 16px;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 800;
      color: rgba(16, 40, 68, 0.70);
    }

    @media (max-width: 860px) {
      .profile-content-grid {
        grid-template-columns: 1fr;
      }

      .favorite-grid {
        grid-template-columns: 1fr;
      }

      .favorite-help {
        text-align: left;
      }

      .favorite-header-row {
        align-items: start;
        flex-direction: column;
      }
    }

    @media (max-width: 540px) {
      .league-home-theme-card.profile-theme-card {
        padding: 18px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .profile-avatar-ring {
        width: 185px;
        height: 185px;
      }
    }
  </style>

<body class="league-home-theme-page profile-theme-page">
  <div class="league-home-theme-overlay">
    <section class="league-home-theme-card profile-theme-card">
      <h1 class="league-home-theme-title">My Profile</h1>
      <p id="profileSubtitle">Loading profile...</p>

      <div class="profile-nav-row">
        <a class="profile-nav-button" href="league-home.html?v=profile-return7">Back to League Home</a>
        <a class="profile-nav-button light" href="my-leagues.html?v=profile-myleagues4">My Leagues</a>
      </div>

      <section class="profile-content-grid">
        <aside class="profile-card-panel profile-avatar-panel">
          <div class="profile-avatar-ring">
            <div class="profile-avatar-circle">
              <img id="profileAvatar" alt="Profile picture">
              <div id="avatarFallback" class="avatar-fallback">?</div>
            </div>
          </div>

          <label class="profile-upload-label">
            Change Profile Picture
            <input id="avatarUpload" type="file" accept="image/*">
          </label>

          <div id="profileStatus" class="profile-status"></div>
        </aside>

        <section class="profile-right-column">
          <div class="profile-card-panel profile-account-panel">
            <p class="profile-section-label">Account Name</p>
            <h2 id="profileUsername" class="profile-username">Loading...</h2>
                <p id="profileEmail" class="profile-email" style="display:none;"></p>
          </div>

          <div class="profile-card-panel profile-stats-panel">
            <p class="profile-section-label">Win-Loss</p>

            <div class="stats-grid">
              <div class="stat-box">
                <span id="lifetimeWL" class="stat-value">0-0</span>
                <span class="stat-name">Lifetime W-L</span>
              </div>

              <div class="stat-box">
                <span id="winPct" class="stat-value">--</span>
                <span class="stat-name">Win %</span>
              </div>
            </div>
          </div>
        </section>

        <section class="profile-card-panel favorite-panel">
          <div class="favorite-header-row">
            <div>
              <p class="profile-section-label">My Favorite Pokémon</p>
            </div>
            <p class="favorite-help">Search and select up to three favorites.</p>
          </div>

          <div class="favorite-grid">
            <div class="favorite-slot" data-favorite-slot="0">
              <div class="favorite-circle">
                <img class="favorite-img" alt="">
                <span class="favorite-empty">+</span>
              </div>
              <div class="favorite-name">Favorite 1</div>
              <input class="favorite-input" list="pokemonOptions" placeholder="Choose Pokémon">
            </div>

            <div class="favorite-slot" data-favorite-slot="1">
              <div class="favorite-circle">
                <img class="favorite-img" alt="">
                <span class="favorite-empty">+</span>
              </div>
              <div class="favorite-name">Favorite 2</div>
              <input class="favorite-input" list="pokemonOptions" placeholder="Choose Pokémon">
            </div>

            <div class="favorite-slot" data-favorite-slot="2">
              <div class="favorite-circle">
                <img class="favorite-img" alt="">
                <span class="favorite-empty">+</span>
              </div>
              <div class="favorite-name">Favorite 3</div>
              <input class="favorite-input" list="pokemonOptions" placeholder="Choose Pokémon">
            </div>
          </div>

          <datalist id="pokemonOptions"></datalist>
          <div id="favoritePokemonStatus">Loading Pokémon database...</div>
        </section>
      </section>
    </section>
  </div>

  <script src="js/theme-settings.js?v=global-theme1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/my-profile.js?v=favorites1"></script>
</body>
</html>
