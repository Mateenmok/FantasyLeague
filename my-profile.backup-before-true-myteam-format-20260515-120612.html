<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Profile | FantasyLeague</title>

  <link rel="stylesheet" href="css/pokemon-ui.css" />

  <style>
    body.profile-theme-page {
      min-height: 100vh;
      margin: 0;
      color: #102844;
      background:
        linear-gradient(rgba(9, 19, 31, 0.34), rgba(9, 19, 31, 0.34)),
        url("images/backgrounds/league-home-bg.png"),
        linear-gradient(135deg, #b8cbd7 0%, #dce8ef 55%, #9fb07d 100%);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: inherit;
    }

    .profile-page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
      box-sizing: border-box;
    }

    .profile-menu-card {
      width: min(1030px, 94vw);
      border-radius: 24px;
      padding: 26px 28px 28px;
      background: rgba(229, 241, 249, 0.86);
      border: 2px solid rgba(255, 255, 255, 0.65);
      box-shadow: 0 22px 56px rgba(5, 16, 31, 0.34);
      backdrop-filter: blur(7px);
      box-sizing: border-box;
    }

    .profile-top-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 8px 0 16px;
    }

    .profile-back-link,
    .profile-account-chip {
      min-width: 170px;
      border-radius: 999px;
      padding: 12px 18px;
      text-align: center;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #102844;
      background: linear-gradient(135deg, #a7d7ee 0%, #77bde0 100%);
      border: 2px solid rgba(255, 255, 255, 0.75);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.60),
        0 8px 18px rgba(16, 40, 68, 0.20);
      box-sizing: border-box;
    }

    .profile-account-chip {
      background: linear-gradient(135deg, #eadca3 0%, #d8bd63 100%);
    }

    .profile-back-link:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .profile-header {
      text-align: center;
      margin: 0 0 14px;
    }

    .profile-header h1 {
      margin: 0;
      font-size: clamp(34px, 4.4vw, 46px);
      line-height: 1;
      letter-spacing: 0.08em;
      color: #102844;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.75);
    }

    .profile-header p {
      margin: 10px 0 0;
      font-size: 15px;
      font-weight: 900;
      color: #243957;
      letter-spacing: 0.03em;
    }

    .profile-info-bar {
      margin: 0 auto 18px;
      border-radius: 14px;
      padding: 11px 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 900;
      color: #102844;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(70, 105, 135, 0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.68);
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 370px 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .profile-tile {
      border-radius: 20px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.66);
      border: 2px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.62),
        0 10px 24px rgba(14, 33, 56, 0.14);
      box-sizing: border-box;
    }

    .profile-tile.avatar-tile {
      grid-row: span 2;
      background: linear-gradient(135deg, #d8edf5 0%, #b9d9ea 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .profile-tile.account-tile {
      background: linear-gradient(135deg, #dce5ef 0%, #bdc9d8 100%);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      min-height: 190px;
    }

    .profile-tile.stats-tile {
      background: linear-gradient(135deg, #d8f2c7 0%, #b6dfa0 100%);
    }

    .profile-tile.extra-tile {
      background: linear-gradient(135deg, #f3d98e 0%, #dfbd5c 100%);
    }

    .profile-section-label {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #283f5e;
    }

    .profile-username {
      margin: 0;
      font-size: clamp(34px, 4.6vw, 48px);
      color: #102844;
      line-height: 1.05;
      letter-spacing: 0.04em;
    }

    .profile-email {
      margin: 9px 0 0;
      font-size: 14px;
      font-weight: 900;
      color: #263a58;
      word-break: break-word;
    }

    .account-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .profile-pill {
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(80, 110, 140, 0.22);
      font-size: 11px;
      font-weight: 900;
      color: #1f3452;
    }

    .profile-icon-badge {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #c8d7ff 0%, #9fb7ee 100%);
      border: 2px solid rgba(255,255,255,0.72);
      box-shadow: 0 10px 20px rgba(24, 42, 68, 0.16);
      flex-shrink: 0;
    }

    .profile-icon-badge img {
      width: 66px;
      height: 66px;
      object-fit: contain;
    }

    .avatar-ring {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      padding: 7px;
      background: linear-gradient(135deg, #fff0a6 0%, #9ed8ef 46%, #c7b5e8 100%);
      box-shadow: 0 16px 34px rgba(16, 36, 60, 0.24);
      box-sizing: border-box;
      margin-bottom: 18px;
    }

    .avatar-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, #dce8f2 0%, #b9cadd 100%);
      border: 4px solid rgba(255, 255, 255, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-fallback {
      font-size: 66px;
      font-weight: 900;
      color: #263452;
    }

    .profile-upload-label {
      width: 100%;
      max-width: 250px;
      border: 0;
      border-radius: 999px;
      padding: 13px 16px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      color: #102844;
      background: linear-gradient(135deg, #f8d57c 0%, #efbd4e 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.55),
        0 8px 16px rgba(26, 44, 70, 0.16);
      box-sizing: border-box;
      text-align: center;
    }

    .profile-upload-label:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .profile-upload-label input {
      display: none;
    }

    .profile-status {
      min-height: 12px;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 900;
      color: #465570;
      line-height: 1.4;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-box {
      border-radius: 16px;
      padding: 18px 10px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(80, 110, 140, 0.20);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.62);
    }

    .stat-value {
      display: block;
      font-size: 32px;
      font-weight: 900;
      color: #102844;
      line-height: 1;
    }

    .stat-name {
      display: block;
      margin-top: 9px;
      font-size: 11px;
      font-weight: 900;
      color: #2b405e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media (max-width: 860px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }

      .profile-tile.avatar-tile {
        grid-row: auto;
      }

      .profile-tile.account-tile {
        grid-template-columns: 1fr;
      }

      .profile-icon-badge {
        display: none;
      }
    }

    @media (max-width: 540px) {
      .profile-menu-card {
        padding: 18px;
      }

      .profile-top-row {
        flex-direction: column;
      }

      .profile-back-link,
      .profile-account-chip {
        width: 100%;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .avatar-ring {
        width: 190px;
        height: 190px;
      }
    }
  </style>
</head>

<body class="profile-theme-page">
  <div class="profile-page-wrap">
    <main class="profile-menu-card">
      <section class="profile-header">
        <h1>MY PROFILE</h1>
        <p>Your account, profile picture, and league stats.</p>
      </section>

      <div class="profile-top-row">
        <a class="profile-back-link" href="league-home.html?v=profile-return4">Back to League Home</a>
        <a class="profile-back-link" href="my-leagues.html?v=profile-myleagues1">My Leagues</a>
      </div>

      <div id="profileInfoBar" class="profile-info-bar">Loading profile...</div>

      <section class="profile-grid">
        <aside class="profile-tile avatar-tile">
          <div class="avatar-ring">
            <div class="avatar-circle">
              <img id="profileAvatar" alt="Profile picture">
              <div id="avatarFallback" class="avatar-fallback">?</div>
            </div>
          </div>

          <label class="profile-upload-label">
            Change Profile Picture
            <input id="avatarUpload" type="file" accept="image/*">
          </label>

          <div id="profileStatus" class="profile-status"></div>
        </aside>

        <section class="profile-tile account-tile">
          <div>
            <p class="profile-section-label">Logged-in account</p>
            <h2 id="profileUsername" class="profile-username">Loading...</h2>
            <p id="profileEmail" class="profile-email"></p>

            <div class="account-badges">
              <span id="profileMiniStatus" class="profile-pill">Loading account...</span>
              <span class="profile-pill">Supabase Account</span>
              <span id="profileAvatarType" class="profile-pill">Avatar: Loading</span>
              <span id="profileUserId" class="profile-pill">User ID: Loading</span>
            </div>
          </div>

          <div class="profile-icon-badge">
            <img src="images/ui/soul.png" alt="">
          </div>
        </section>

        <section class="profile-tile stats-tile">
          <p class="profile-section-label">Statistics</p>

          <div class="stats-grid">
            <div class="stat-box">
              <span id="lifetimeWL" class="stat-value">0-0</span>
              <span class="stat-name">Lifetime W-L</span>
            </div>

            <div class="stat-box">
              <span id="winPct" class="stat-value">--</span>
              <span class="stat-name">Win %</span>
            </div>
          </div>
        </section>

        <section class="profile-tile extra-tile">
          <p class="profile-section-label">Coming soon</p>

          <div class="stats-grid">
            <div class="stat-box">
              <span id="profileLevel" class="stat-value">1</span>
              <span class="stat-name">Profile Level</span>
            </div>

            <div class="stat-box">
              <span id="titlesWon" class="stat-value">0</span>
              <span class="stat-name">Titles</span>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/my-profile.js"></script>
</body>
</html>
