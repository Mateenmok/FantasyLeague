<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Profile | FantasyLeague</title>

  <link rel="stylesheet" href="css/pokemon-ui.css" />

  <style>
    body.profile-theme-page {
      min-height: 100vh;
      margin: 0;
      color: #17233f;
      background:
        linear-gradient(rgba(18, 29, 47, 0.30), rgba(18, 29, 47, 0.30)),
        url("images/backgrounds/league-home-bg.png"),
        linear-gradient(135deg, #b9cbd8 0%, #dce8ef 52%, #a9b98c 100%);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: inherit;
    }

    .profile-page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
      box-sizing: border-box;
    }

    .profile-menu-card {
      width: min(960px, 94vw);
      border-radius: 22px;
      padding: 22px;
      background: rgba(235, 244, 250, 0.88);
      border: 2px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 22px 55px rgba(8, 20, 36, 0.30);
      backdrop-filter: blur(8px);
      box-sizing: border-box;
    }

    .profile-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .profile-back-link,
    .profile-account-chip {
      border-radius: 999px;
      padding: 8px 13px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      color: #17233f;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(118, 143, 170, 0.32);
      box-shadow: 0 7px 16px rgba(24, 42, 68, 0.12);
    }

    .profile-back-link:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .profile-header {
      text-align: center;
      margin: 10px 0 18px;
    }

    .profile-header h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 52px);
      letter-spacing: 0.16em;
      color: #17233f;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.85);
    }

    .profile-header p {
      margin: 7px 0 0;
      font-size: 14px;
      font-weight: 900;
      color: #42506d;
    }

    .profile-info-bar {
      margin: 0 auto 18px;
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
      font-size: 13px;
      font-weight: 900;
      color: #17233f;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(118, 143, 170, 0.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .profile-grid {
      display: grid;
      grid-template-columns: 1.05fr 1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .profile-tile {
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(135deg, #dce5ef 0%, #bdc9d8 100%);
      border: 2px solid rgba(255, 255, 255, 0.82);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.60),
        0 10px 22px rgba(23, 36, 58, 0.13);
      box-sizing: border-box;
    }

    .profile-tile.avatar-tile {
      grid-row: span 2;
      background: linear-gradient(135deg, #e7ddf2 0%, #c9c0cf 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .profile-tile.account-tile {
      grid-column: span 2;
      background: linear-gradient(135deg, #dce5ef 0%, #bdc9d8 100%);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .profile-tile.stats-tile {
      background: linear-gradient(135deg, #d8f2c7 0%, #b6dfa0 100%);
    }

    .profile-tile.extra-tile {
      background: linear-gradient(135deg, #bfe8f3 0%, #8fc9df 100%);
    }

    .profile-section-label {
      margin: 0 0 9px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #5a6680;
    }

    .profile-username {
      margin: 0;
      font-size: clamp(30px, 4vw, 44px);
      color: #17233f;
      line-height: 1.05;
    }

    .profile-email {
      margin: 8px 0 0;
      font-size: 14px;
      font-weight: 900;
      color: #46536d;
      word-break: break-word;
    }

    .account-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .profile-pill {
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(118, 143, 170, 0.24);
      font-size: 11px;
      font-weight: 900;
      color: #2e3b5a;
    }

    .profile-icon-badge {
      width: 82px;
      height: 82px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #c8d7ff 0%, #9fb7ee 100%);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: 0 10px 20px rgba(24, 42, 68, 0.14);
      flex-shrink: 0;
    }

    .profile-icon-badge img {
      width: 62px;
      height: 62px;
      object-fit: contain;
    }

    .avatar-ring {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      padding: 7px;
      background: linear-gradient(135deg, #f8d57c 0%, #bfe8f3 48%, #c9c0cf 100%);
      box-shadow: 0 16px 34px rgba(21, 35, 56, 0.22);
      box-sizing: border-box;
      margin-bottom: 16px;
    }

    .avatar-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, #dce8f2 0%, #b9cadd 100%);
      border: 4px solid rgba(255, 255, 255, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-fallback {
      font-size: 66px;
      font-weight: 900;
      color: #263452;
    }

    .profile-upload-label {
      width: 100%;
      max-width: 230px;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      color: #17233f;
      background: linear-gradient(135deg, #f8d57c 0%, #efbd4e 100%);
      box-shadow: 0 8px 16px rgba(26, 44, 70, 0.14);
      box-sizing: border-box;
      text-align: center;
    }

    .profile-upload-label:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .profile-upload-label input {
      display: none;
    }

    .profile-status {
      min-height: 16px;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 900;
      color: #465570;
      line-height: 1.4;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      border-radius: 15px;
      padding: 15px 10px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(120, 145, 170, 0.24);
      text-align: center;
    }

    .stat-value {
      display: block;
      font-size: 28px;
      font-weight: 900;
      color: #17233f;
      line-height: 1;
    }

    .stat-name {
      display: block;
      margin-top: 8px;
      font-size: 10px;
      font-weight: 900;
      color: #5a6680;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .next-feature-text {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      color: #263852;
      line-height: 1.55;
    }

    @media (max-width: 860px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }

      .profile-tile.avatar-tile,
      .profile-tile.account-tile {
        grid-column: auto;
        grid-row: auto;
      }

      .profile-tile.account-tile {
        grid-template-columns: 1fr;
      }

      .profile-icon-badge {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .profile-menu-card {
        padding: 16px;
      }

      .profile-top-row {
        align-items: stretch;
        flex-direction: column;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .avatar-ring {
        width: 185px;
        height: 185px;
      }
    }
  </style>
</head>

<body class="profile-theme-page">
  <div class="profile-page-wrap">
    <main class="profile-menu-card">
      <div class="profile-top-row">
        <a class="profile-back-link" href="league-home.html?v=profile-return3">← Back to League Home</a>
        <div id="profileMiniStatus" class="profile-account-chip">Loading account...</div>
      </div>

      <section class="profile-header">
        <h1>MY PROFILE</h1>
        <p>Your account, profile picture, and league stats.</p>
      </section>

      <div id="profileInfoBar" class="profile-info-bar">Loading profile...</div>

      <section class="profile-grid">
        <aside class="profile-tile avatar-tile">
          <div class="avatar-ring">
            <div class="avatar-circle">
              <img id="profileAvatar" alt="Profile picture">
              <div id="avatarFallback" class="avatar-fallback">?</div>
            </div>
          </div>

          <label class="profile-upload-label">
            Change Profile Picture
            <input id="avatarUpload" type="file" accept="image/*">
          </label>

          <div id="profileStatus" class="profile-status"></div>
        </aside>

        <section class="profile-tile account-tile">
          <div>
            <p class="profile-section-label">Logged-in account</p>
            <h2 id="profileUsername" class="profile-username">Loading...</h2>
            <p id="profileEmail" class="profile-email"></p>

            <div class="account-badges">
              <span class="profile-pill">Supabase Account</span>
              <span id="profileAvatarType" class="profile-pill">Avatar: Loading</span>
              <span id="profileUserId" class="profile-pill">User ID: Loading</span>
            </div>
          </div>

          <div class="profile-icon-badge">
            <img src="images/ui/soul.png" alt="">
          </div>
        </section>

        <section class="profile-tile stats-tile">
          <p class="profile-section-label">Statistics</p>

          <div class="stats-grid">
            <div class="stat-box">
              <span id="lifetimeWL" class="stat-value">0-0</span>
              <span class="stat-name">Lifetime W-L</span>
            </div>

            <div class="stat-box">
              <span id="winPct" class="stat-value">--</span>
              <span class="stat-name">Win %</span>
            </div>
          </div>
        </section>

        <section class="profile-tile extra-tile">
          <p class="profile-section-label">Coming soon</p>

          <div class="stats-grid">
            <div class="stat-box">
              <span id="profileLevel" class="stat-value">1</span>
              <span class="stat-name">Profile Level</span>
            </div>

            <div class="stat-box">
              <span id="titlesWon" class="stat-value">0</span>
              <span class="stat-name">Titles</span>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/my-profile.js"></script>
</body>
</html>
