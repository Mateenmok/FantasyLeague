<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Join League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/pokemon-ui.css?v=teamaccess2">
</head>
<body>
  <div class="page-overlay">
    <section class="pkmn-window">
      <img class="corner-ball top-left" src="images/ui/retroball.png" alt="">
      <img class="corner-ball top-right" src="images/ui/retroball.png" alt="">
      <img class="corner-ball bottom-left" src="images/ui/retroball.png" alt="">
      <img class="corner-ball bottom-right" src="images/ui/retroball.png" alt="">

      <div class="pkmn-title-box">
        <h1 class="pkmn-title">JOIN LEAGUE</h1>
        <p class="pkmn-subtitle">Enter your league code and team access code.</p>
      </div>

      <div class="pkmn-panel">
        <label class="join-league-label" for="leagueCodeInput">League Code</label>
        <input id="leagueCodeInput" class="pkmn-input join-league-input" type="text" maxlength="12" placeholder="Example: ABC123">

        <label class="join-league-label join-league-second-label" for="teamAccessCodeInput">Team Access Code</label>
        <input id="teamAccessCodeInput" class="pkmn-input join-league-input" type="text" maxlength="12" placeholder="Example: TEAM42">

        <div class="join-league-actions">
          <button id="joinLeagueButton" class="pkmn-button">Join League</button>
          <a class="pkmn-button-link secondary" href="account.html">Back to Account</a>
        </div>
      </div>

      <div id="joinLeagueMessage" class="pkmn-footer-note">
        Enter both codes to join.
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/join-league.js?v=teamaccess2"></script>
</body>
</html>
