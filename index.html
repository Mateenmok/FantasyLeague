<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pokemon Draft League Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-image: url("images/backgrounds/Stadium4.webp");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      font-family: "Oxanium", Arial, sans-serif;
    }

    .home-overlay {
      min-height: 100vh;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      text-align: center;
      padding-top: 55px;
      box-sizing: border-box;
    }

    .home-content {
      width: 100%;
    }

    h1 {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 1.5px;
      margin: 0;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.8);
    }

    .home-buttons {
      margin-top: 62px;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      gap: 44px;
      flex-wrap: nowrap;
      padding-left: 10%;
      width: 100%;
    }

    .pokeball-link {
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s ease;
    }

    .pokeball-link:hover {
      transform: translateY(-8px) scale(1.04);
    }

    .pokeball-button {
      width: 148px;
      height: 148px;
      object-fit: contain;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.8));
    }

    .button-caption {
      margin-top: -2px;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.9);
    }
  </style>
</head>
<body>
  <div class="home-overlay">
    <div class="home-content">
      <h1>Pokemon Draft League Hub</h1>

      <div class="home-buttons">
        <a class="pokeball-link" href="create-league.html">
          <img class="pokeball-button" src="images/buttons/PBall1.png" alt="Create League">
          <div class="button-caption">Create League</div>
        </a>

        <a class="pokeball-link" href="teams.html">
          <img class="pokeball-button" src="images/buttons/GBall.png" alt="League Teams">
          <div class="button-caption">Team Info</div>
        </a>

      
        <a class="pokeball-link" href="standings.html">
          <img class="pokeball-button" src="images/buttons/UBall.png" alt="League Standings">
          <div class="button-caption">Standings</div>
        </a>
      
        <a class="pokeball-link" href="schedule.html">
          <img class="pokeball-button" src="images/buttons/FBall.png" alt="Schedule">
          <div class="button-caption">Schedule</div>
        </a>
      
        <a class="pokeball-link" href="scoreboard.html">
          <img class="pokeball-button" src="images/buttons/HBall.png" alt="Scoreboard">
          <div class="button-caption">Scoreboard</div>
        </a>
      
        <a class="pokeball-link" href="draft-room.html">
          <img class="pokeball-button" src="images/buttons/DreamBall.png" alt="Draft Room">
          <div class="button-caption">Draft Room</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
