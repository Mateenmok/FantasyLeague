<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon League — Matchup</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Chakra+Petch:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: rgba(14, 14, 22, 0.85);
    --surface-alt: rgba(26, 26, 38, 0.8);
    --border: #2a2a3a;
    --text: #ffffff;
    --text-dim: #b0b0c0;
    --gold: #ffd700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .bg-stadium {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('images/stadium.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .bg-overlay {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(180deg,
      rgba(6,6,12,0.7) 0%, rgba(6,6,12,0.5) 30%,
      rgba(6,6,12,0.6) 60%, rgba(6,6,12,0.8) 100%);
  }
  .container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 30px 24px;
  }
  .page-header {
    text-align: center; margin-bottom: 24px;
    animation: fadeDown 0.6s ease-out;
  }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } }
  .page-title {
    font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 2.2rem;
    letter-spacing: 6px; text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(255,255,255,0.2);
    margin-bottom: 4px;
  }
  .page-subtitle {
    font-family: 'Rajdhani', sans-serif; font-weight: 400;
    font-size: 0.95rem; letter-spacing: 4px; text-transform: uppercase;
    color: var(--text-dim);
  }
  .matchup-layout {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 0; align-items: start;
    animation: fadeUp 0.7s ease-out 0.2s both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } }
  .team-col {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; padding: 0 16px;
  }
  .team-logo-wrap {
    width: 100%; max-width: 220px; padding: 12px;
    border-radius: 12px; background: var(--surface);
    border: 1px solid var(--border); text-align: center;
    backdrop-filter: blur(8px);
    border-top: 3px solid rgba(255,255,255,0.3);
  }
  .team-logo-wrap img { width: 100%; height: 120px; object-fit: contain; }
  .team-label {
    font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1.1rem;
    letter-spacing: 3px; text-transform: uppercase; margin-top: 6px;
    color: #ffffff;
  }
  .team-record {
    font-family: 'Rajdhani', sans-serif; font-weight: 500;
    font-size: 0.9rem; letter-spacing: 3px; color: var(--text-dim); margin-bottom: 8px;
  }
  .center-col {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 0 16px;
  }
  .pokeball-center {
    width: 200px; height: 200px; opacity: 0.9;
  }
  .pokeball-center img {
    width: 100%; height: 100%; object-fit: contain;
    filter: drop-shadow(0 0 25px rgba(255,255,255,0.15));
  }
  .scoreboard {
    display: flex; flex-direction: column; align-items: center;
    margin-top: 20px;
  }
  .score-label {
    font-family: 'Rajdhani', sans-serif; font-weight: 500;
    font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .score-display { display: flex; align-items: center; gap: 16px; }
  .score-num {
    font-family: 'Chakra Petch', sans-serif; font-weight: 700;
    font-size: 3.5rem; line-height: 1; color: #ffffff;
  }
  .score-dash {
    font-family: 'Chakra Petch', sans-serif; font-weight: 300;
    font-size: 2.5rem; color: var(--text-dim);
  }
  .score-vs {
    font-family: 'Rajdhani', sans-serif; font-weight: 400;
    font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-dim); margin-top: 8px;
  }
  .pokemon-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; width: 100%; margin-top: 8px;
  }
  .pokemon-card {
    aspect-ratio: 1; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 8px;
    transition: transform 0.2s, box-shadow 0.2s;
    backdrop-filter: blur(6px);
  }
  .pokemon-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(255,255,255,0.1);
  }
  .pokemon-card img { width: 80%; height: 60%; object-fit: contain; }
  .pokemon-name {
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
    font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-dim); margin-top: 6px; text-align: center;
  }
  .status-bar {
    text-align: center; margin-top: 48px;
    animation: fadeUp 0.7s ease-out 0.5s both;
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Rajdhani', sans-serif; font-weight: 500;
    font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); border: 1px solid var(--border);
    padding: 8px 20px; border-radius: 100px;
    background: var(--surface); backdrop-filter: blur(6px);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #4caf50;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @media (max-width: 800px) {
    .matchup-layout { grid-template-columns: 1fr; gap: 24px; }
    .center-col { order: -1; }
    .team-col { padding: 0; }
    .score-num { font-size: 2.5rem; }
    .pokeball-center { width: 140px; height: 140px; }
  }
</style>
</head>
<body>
<div class="bg-stadium"></div>
<div class="bg-overlay"></div>
<div class="container">
  <div class="page-header">
    <div class="page-title">Pokemon League</div>
    <div class="page-subtitle">Season 1, Week 5</div>
  </div>
  <div class="matchup-layout">
    <div class="team-col home">
      <div class="team-logo-wrap">
        <img src="images/Mankeys.png" alt="Mankeys Logo">
        <div class="team-label">Mankeys</div>
      </div>
      <div class="team-record">Record: 2 – 2</div>
      <div class="pokemon-grid">
        <div class="pokemon-card">
          <img src="images/Gyarados.png" alt="Gyarados">
          <span class="pokemon-name">Gyarados</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Politoed.png" alt="Politoed">
          <span class="pokemon-name">Politoed</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Blastoise.png" alt="Blastoise">
          <span class="pokemon-name">Blastoise</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Pikachu.png" alt="Pikachu">
          <span class="pokemon-name">Pikachu</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Kingambit.png" alt="Kingambit">
          <span class="pokemon-name">Kingambit</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Basculegion.png" alt="Basculegion">
          <span class="pokemon-name">Basculegion</span>
        </div>
      </div>
    </div>
    <div class="center-col">
      <div class="pokeball-center">
        <img src="images/Pokeball3.png" alt="Pokeball">
      </div>
      <div class="scoreboard">
        <span class="score-label">Score</span>
        <div class="score-display">
          <span class="score-num">2</span>
          <span class="score-dash">–</span>
          <span class="score-num">1</span>
        </div>
        <span class="score-vs">Battles Won</span>
      </div>
    </div>
    <div class="team-col away">
      <div class="team-logo-wrap">
        <img src="images/Sawsbucks.png" alt="Sawsbucks Logo">
        <div class="team-label">Sawsbucks</div>
      </div>
      <div class="team-record">Record: 4 – 0</div>
      <div class="pokemon-grid">
        <div class="pokemon-card">
          <img src="images/Excadrill.png" alt="Excadrill">
          <span class="pokemon-name">Excadrill</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Tyranitar.png" alt="Tyranitar">
          <span class="pokemon-name">Tyranitar</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Ampharos.png" alt="Ampharos">
          <span class="pokemon-name">Ampharos</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Audino.png" alt="Audino">
          <span class="pokemon-name">Audino</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Watchhog.png" alt="Watchhog">
          <span class="pokemon-name">Watchhog</span>
        </div>
        <div class="pokemon-card">
          <img src="images/Skeleridge.png" alt="Skeleridge">
          <span class="pokemon-name">Skeleridge</span>
        </div>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-pill">
      <span class="status-dot"></span>
      Live — Matchup Active
    </div>
  </div>
</div>
</body>
</html>
